<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><link rel="stylesheet" href="./base.css"><title>{{title}}</title></head>
  <body>
    <main class="canvas" data-visual-kind="market">
      <header class="brand"><span class="brand-dot"></span><span class="brand-name">SIGNAL MATRIX</span><span class="brand-cn">链上情报局</span></header>
      <div class="eyebrow"><span class="pill pill--accent">市场异动</span><span class="pill">{{status}}</span><time class="timestamp">{{updatedAt}}</time></div>
      <h1 style="font-size:61px;margin-top:72px">{{title}}</h1>
      <section style="display:flex;align-items:end;margin-top:54px"><b style="font:800 74px/1 Menlo,monospace">{{symbol}}</b><b style="font:750 58px/1 Menlo,monospace;color:var(--change);margin-left:auto">{{changePercent}}%</b></section>
      <section class="panel" id="chart" style="height:452px;margin-top:62px;padding:24px" aria-label="行情图表">{{chartHtml}}</section>
      <footer class="footer"><span class="source-label">来源</span>{{source}}<small>更早发现 · 交叉核实 · 清晰解读 · 信息不构成投资建议</small></footer>
    </main>
  </body>
</html>
